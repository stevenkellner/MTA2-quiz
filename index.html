<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prüfungsvorbereitung</title>
    <meta name="language" content="de" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Prüfungsvorbereitung</h1>
        <p>Wähle ein Quiz aus</p>
      </header>

      <section class="card">
        <h2 class="question">Quiz auswählen</h2>
        <div id="quizList"></div>
      </section>
    </main>

    <script>
      async function init() {
        const listEl = document.getElementById('quizList');
        try {
          const res = await fetch('data/config.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`Konfiguration konnte nicht geladen werden (${res.status})`);
          const quizzes = await res.json();
          const active = (Array.isArray(quizzes) ? quizzes : []).filter((q) => q.active !== false);
          if (!active.length) {
            listEl.innerHTML = '<p style="color:var(--muted)">Keine Quizze verfügbar.</p>';
            return;
          }
          active.forEach((quiz) => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';

            const a = document.createElement('a');
            a.href = `quiz.html?id=${encodeURIComponent(quiz.id)}`;
            a.textContent = quiz.title;
            a.style.cssText =
              'flex:1;font-size:1.1rem;padding:14px 16px;' +
              'text-align:left;background:var(--accent);color:#fff;border-radius:10px;' +
              'text-decoration:none;box-sizing:border-box;';

            const fragen = document.createElement('a');
            fragen.href = `fragen.html?id=${encodeURIComponent(quiz.id)}`;
            fragen.textContent = 'Fragenübersicht';
            fragen.style.cssText =
              'white-space:nowrap;font-size:0.9rem;padding:14px 14px;' +
              'background:var(--card);color:var(--accent);border:1px solid var(--line);border-radius:10px;' +
              'text-decoration:none;box-sizing:border-box;';

            row.appendChild(a);
            row.appendChild(fragen);
            listEl.appendChild(row);
          });
        } catch (err) {
          listEl.innerHTML = `<p style="color:var(--muted)">${err.message}</p>`;
        }
      }
      init();
    </script>
  </body>
</html>
