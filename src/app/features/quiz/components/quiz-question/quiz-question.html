<section class="card" aria-labelledby="question-heading">
    <h2 id="question-heading" class="question">{{ question().text || '(Kein Fragetext)' }}</h2>
    @if (question().imageUrl) {
        <img
            class="question-image"
            [src]="question().imageUrl"
            alt="Fragenillustration"
            (error)="onImageError($any($event.target))"
        />
    }
    <div
        #answersRef
        class="answers"
        role="group"
        aria-labelledby="question-heading"
    >
        @for (answer of question().answers; track answer.text; let i = $index) {
            <label
                class="answer-item"
                [class.correct]="revealed() && answer.isCorrect"
                [class.incorrect]="revealed() && !answer.isCorrect"
            >
                <input
                    type="checkbox"
                    name="answer"
                    [value]="i"
                    [checked]="selectedAnswers()[i]"
                    [disabled]="revealed()"
                    (change)="toggleAnswer.emit(i)"
                />
                <span>{{ answer.text }}</span>
            </label>
        }
    </div>
</section>

<div class="actions">
    <p
        class="status"
        [class.correct]="statusMessage().kind === 'correct'"
        [class.incorrect]="statusMessage().kind === 'incorrect'"
        aria-live="polite"
        aria-atomic="true"
    >{{ statusMessage().text }}</p>
    <button type="button" (click)="onAction()">{{ actionButtonText() }}</button>
</div>
