<section class="card" aria-labelledby="select-heading">
    <div class="card-header">
        <h2 id="select-heading" class="question">{{ i18n().quiz.select.heading }}</h2>
        <button type="button" class="back-btn" (click)="state.navigateToStart()"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> {{ i18n().nav.back }}</button>
    </div>
    <div class="select-toolbar">
        <input
            #searchInput
            type="search"
            [placeholder]="i18n().quiz.select.search.placeholder"
            [value]="searchTerm()"
            (input)="onSearchInput($any($event.target).value)"
            [attr.aria-label]="i18n().quiz.select.search.label"
        />
        <div class="select-btn-group">
            <button type="button" (click)="state.selectAllQuestions()">{{ i18n().quiz.select.all }}</button>
            <button type="button" (click)="state.deselectAllQuestions()">{{ i18n().quiz.select.none }}</button>
        </div>
    </div>
    <p class="select-info" aria-live="polite">{{ infoText() }}</p>
    <div class="select-list" role="list" [attr.aria-label]="i18n().quiz.select.listLabel">
        @for (entry of filteredEntries(); track entry.idx) {
            <div
                class="select-entry"
                [class.selected]="isIndexSelected(entry.idx)"
                role="listitem"
                (click)="state.toggleSelectEntry(entry.idx)"
                (keydown.space)="$event.preventDefault(); state.toggleSelectEntry(entry.idx)"
                (keydown.enter)="$event.stopPropagation(); state.toggleSelectEntry(entry.idx)"
                tabindex="0"
                [attr.aria-pressed]="isIndexSelected(entry.idx)"
                [attr.aria-label]="i18n().quiz.select.entryLabel(entry.idx + 1, entry.q.text || i18n().quiz.select.noText)"
            >
                <span class="select-entry-num" aria-hidden="true">{{ entry.idx + 1 }}.</span>
                <span class="select-entry-text">{{ entry.q.text || i18n().quiz.select.noText }}</span>
                <span class="select-checkbox" aria-hidden="true"></span>
            </div>
        }
        @if (filteredEntries().length === 0) {
            <p class="select-no-results">{{ i18n().quiz.select.noResults }}</p>
        }
    </div>
</section>

<div class="actions">
    <p
        class="status"
        [class.incorrect]="statusText()"
        aria-live="polite"
    >{{ statusText() }}</p>
    <button type="button" [disabled]="state.selectedIndices().size === 0" (click)="attemptStart()">
        {{ i18n().quiz.select.startBtn }}
    </button>
</div>
