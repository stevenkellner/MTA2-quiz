<section class="card" aria-labelledby="start-heading">
    <div class="card-header">
        <h2 id="start-heading" class="question">{{ i18n().quiz.start.heading }}</h2>
        <a routerLink="/" class="back-link">{{ i18n().nav.backToSelection }}</a>
    </div>
    <div class="start-form">
        <label for="question-count-id">{{ i18n().quiz.start.countLabel }}</label>
        <input
            #countInput
            id="question-count-id"
            type="number"
            [min]="1"
            [max]="state.maxQuestions()"
            [value]="state.defaultCount()"
            required
            class="count-input"
            aria-describedby="start-status"
        />
        <label class="toggle-row" for="show-answer-toggle">
            <span>{{ i18n().quiz.start.showAnswer }}</span>
            <span
                class="toggle-track"
                [class.on]="state.showAnswerAfterGuess()"
                aria-hidden="true"
            >
                <span class="toggle-thumb"></span>
            </span>
            <input
                id="show-answer-toggle"
                type="checkbox"
                class="toggle-input"
                [checked]="state.showAnswerAfterGuess()"
                (change)="state.setShowAnswerAfterGuess($any($event.target).checked)"
            />
        </label>
    </div>
    <div class="alt-actions" [attr.aria-label]="i18n().quiz.start.altActionsLabel">
        <button type="button" class="alt-btn" (click)="state.navigateToSelect()">
            <span class="alt-btn-title">{{ i18n().quiz.start.manual.title }}</span>
            <span class="alt-btn-sub">{{ i18n().quiz.start.manual.sub }}</span>
        </button>
        <a [routerLink]="['/fragen', state.quizId()]" class="alt-btn">
            <span class="alt-btn-title">{{ i18n().quiz.start.browse.title }}</span>
            <span class="alt-btn-sub">{{ i18n().quiz.start.browse.sub }}</span>
        </a>
    </div>
</section>

<div class="actions">
    <p
        id="start-status"
        class="status"
        [class.incorrect]="statusText()"
        aria-live="polite"
    >{{ statusText() }}</p>
    <button type="button" (click)="attemptStart()">{{ i18n().quiz.start.btn }}</button>
</div>
