<main class="app">
    <header class="topbar">
        <h1>{{ quizTitle() }}</h1>
        <p aria-live="polite">{{ progressText() }}</p>
    </header>

    @if (loading()) {
        <section class="card">
            <p class="muted">Fragen werden geladen…</p>
        </section>
    } @else if (loadError()) {
        <section class="card" role="alert">
            <p class="muted">{{ loadError() }}</p>
            <a routerLink="/" class="back-link">← Zur Auswahl</a>
        </section>
    } @else {
        @switch (view()) {
            @case ('start') {
                <app-quiz-start
                    [maxQuestions]="maxQuestions()"
                    [defaultCount]="defaultCount()"
                    (start)="onStart($event)"
                    (openSelect)="openSelectCard()"
                />
            }
            @case ('select') {
                <app-quiz-select
                    [allQuestions]="allQuestions()"
                    [selectedIndices]="selectedIndices()"
                    (back)="backToStart()"
                    (start)="onStartWithSelected()"
                    (toggle)="toggleSelectEntry($event)"
                    (selectAll)="selectAll()"
                    (deselectAll)="deselectAll()"
                />
            }
            @case ('question') {
                @if (currentQuestion(); as q) {
                    <app-quiz-question
                        [question]="q"
                        [selectedAnswers]="selectedAnswers()"
                        [revealed]="revealed()"
                        [isLastQuestion]="isLastQuestion()"
                        [statusMessage]="questionStatusMessage()"
                        (toggleAnswer)="toggleAnswer($event)"
                        (confirm)="onConfirm()"
                        (next)="onNext()"
                    />
                }
            }
            @case ('finished') {
                <app-quiz-finished
                    [wrongAnswers]="wrongAnswers()"
                    [statusMessage]="finishedStatusMessage()"
                    (restart)="onRestart()"
                />
            }
        }
    }
</main>
