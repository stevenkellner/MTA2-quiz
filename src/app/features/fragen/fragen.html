<main class="app">
    <header class="topbar">
        <h1>{{ pageTitle() }}</h1>
        <p><button type="button" class="back-link" (click)="goBack()">{{ i18n().nav.back }}</button></p>
    </header>

    <div class="search-bar">
        <input
            type="search"
            [placeholder]="i18n().fragen.search.placeholder"
            [value]="searchTerm()"
            (input)="onSearchInput($any($event.target).value)"
            [attr.aria-label]="i18n().fragen.search.label"
        />
    </div>
    <p class="search-info" aria-live="polite">{{ searchInfoText() }}</p>

    @if (loading()) {
        <div class="fragen-list">
            <p class="no-results">{{ i18n().errors.loading }}</p>
        </div>
    } @else if (loadError()) {
        <div class="fragen-list" role="alert">
            <p class="no-results">{{ loadError() }}</p>
        </div>
    } @else {
        <div class="fragen-list">
            @if (filteredQuestions().length === 0) {
                <p class="no-results">{{ i18n().fragen.noResults }}</p>
            }
            @for (question of filteredQuestions(); track question.text) {
                <article class="fragen-entry">
                    <app-question-view
                        mode="display"
                        [question]="question"
                        [searchTerm]="searchTerm()"
                    />
                </article>
            }
        </div>
    }
</main>
